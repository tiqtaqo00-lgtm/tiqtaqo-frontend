<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir Accessoires - TiqtaQo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile-fix.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gender-selection-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .gender-container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .gender-title {
            color: white;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .gender-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.3rem;
            margin-bottom: 4rem;
        }

        .gender-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        .gender-card {
            background: white;
            border-radius: 30px;
            padding: 4rem 3rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .gender-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(0,0,0,0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gender-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        .gender-card:hover::before {
            opacity: 1;
        }

        .gender-card.homme {
            border-top: 5px solid #3b82f6;
        }

        .gender-card.femme {
            border-top: 5px solid #ec4899;
        }

        .gender-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: transform 0.3s;
        }

        .gender-card:hover .gender-icon {
            transform: scale(1.2) rotate(5deg);
        }

        .gender-card.homme .gender-icon {
            color: #3b82f6;
        }

        .gender-card.femme .gender-icon {
            color: #ec4899;
        }

        .gender-card-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1f2937;
        }

        .gender-card-description {
            font-size: 1.1rem;
            color: #6b7280;
            line-height: 1.6;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .gender-title {
                font-size: 2rem;
            }

            .gender-subtitle {
                font-size: 1rem;
            }

            .gender-cards {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .gender-card {
                padding: 3rem 2rem;
            }

            .gender-icon {
                font-size: 4rem;
            }

            .gender-card-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Retour
    </button>

    <div class="gender-selection-page">
        <div class="gender-container">
            <h1 class="gender-title">
                <i class="fas fa-gem"></i> Accessoires
            </h1>
            <p class="gender-subtitle">Choisissez votre catégorie</p>

            <div class="gender-cards">
                <div class="gender-card homme" onclick="window.location.href='accessoires-homme.html'">
                    <div class="gender-icon">
                        <i class="fas fa-mars"></i>
                    </div>
                    <h2 class="gender-card-title">Accessoires Homme</h2>
                    <p class="gender-card-description">
                        Découvrez nos accessoires élégants pour hommes avec des designs uniques
                    </p>
                </div>

                <div class="gender-card femme" onclick="window.location.href='accessoires-femme.html'">
                    <div class="gender-icon">
                        <i class="fas fa-venus"></i>
                    </div>
                    <h2 class="gender-card-title">Accessoires Femme</h2>
                    <p class="gender-card-description">
                        Explorez nos accessoires raffinés pour femmes avec style et élégance
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
