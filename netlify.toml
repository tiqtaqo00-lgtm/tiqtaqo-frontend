[build]
  # مجلد النشر - حيث توجد ملفات HTML
  publish = "public"
  
  # لا نحتاج لأمر بناء لأن الموقع HTML ثابت
  command = "echo 'Static site - no build needed'"

# إعدادات إعادة التوجيه للصفحات
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  
# إعدادات الأمان والأداء
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
