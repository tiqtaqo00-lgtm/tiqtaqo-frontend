<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - TiqtaQo Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            direction: rtl;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #000;
            color: white;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            left: 0;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #999;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: block;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: #333;
            color: white;
        }

        .sidebar-menu i {
            margin-left: 10px;
            width: 20px;
        }

        /* Main Content */
        .main-content {
            margin-right: 250px;
            flex: 1;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #000;
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #000;
            color: white;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        /* Content Sections */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Products Section */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .product-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .product-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #000;
        }

        .product-info p {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .product-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #007bff;
            color: white;
        }

        .edit-btn:hover {
            background: #0056b3;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        /* Form */
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .submit-btn {
            background: #28a745;
            color: white;
        }

        .submit-btn:hover {
            background: #218838;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .cancel-btn:hover {
            background: #5a6268;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        table th {
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        /* Messages */
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-right: 200px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                margin-right: 0;
            }

            .header-actions {
                flex-direction: column;
            }

            .header-actions button {
                width: 100%;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>TiqtaQo</h2>
                <p>لوحة التحكم</p>
            </div>

            <ul class="sidebar-menu">
                <li><a href="#" class="menu-link active" data-section="dashboard"><i class="fas fa-chart-line"></i> لوحة التحكم</a></li>
                <li><a href="#" class="menu-link" data-section="products"><i class="fas fa-box"></i> المنتجات</a></li>
                <li><a href="#" class="menu-link" data-section="categories"><i class="fas fa-list"></i> الأقسام</a></li>
                <li><a href="#" class="menu-link" data-section="add-product"><i class="fas fa-plus"></i> إضافة منتج</a></li>
                <li><a href="#" class="menu-link" data-section="add-category"><i class="fas fa-plus"></i> إضافة قسم</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h1 id="pageTitle">لوحة التحكم</h1>
                <div class="header-actions">
                    <span id="adminEmail" style="color: #666; font-size: 14px;"></span>
                </div>
            </div>

            <!-- Messages -->
            <div id="successMessage" class="message success"></div>
            <div id="errorMessage" class="message error"></div>
            <div id="infoMessage" class="message info"></div>

            <!-- Dashboard Section -->
            <div id="dashboard" class="content-section active">
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
                    <h2>مرحباً بك في لوحة التحكم</h2>
                    <p style="margin-top: 10px; color: #666;">استخدم القائمة الجانبية للتنقل بين الأقسام المختلفة</p>
                </div>
            </div>

            <!-- Products Section -->
            <div id="products" class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>المنتجات</h2>
                    <button class="btn btn-primary" onclick="switchSection('add-product')">
                        <i class="fas fa-plus"></i> إضافة منتج جديد
                    </button>
                </div>

                <div id="productsLoading" class="loading">
                    <div class="spinner"></div>
                </div>

                <div id="productsContainer" class="products-grid"></div>
            </div>

            <!-- Categories Section -->
            <div id="categories" class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>الأقسام</h2>
                    <button class="btn btn-primary" onclick="switchSection('add-category')">
                        <i class="fas fa-plus"></i> إضافة قسم جديد
                    </button>
                </div>

                <div id="categoriesLoading" class="loading">
                    <div class="spinner"></div>
                </div>

                <div id="categoriesContainer" class="table-container"></div>
            </div>

            <!-- Add Product Section -->
            <div id="add-product" class="content-section">
                <h2>إضافة منتج جديد</h2>
                <div class="form-container">
                    <form id="productForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productName">اسم المنتج *</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label for="productPrice">السعر *</label>
                                <input type="number" id="productPrice" step="0.01" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="productCategory">القسم *</label>
                                <select id="productCategory" required>
                                    <option value="">اختر قسماً</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="productSubcategory">الفرع</label>
                                <input type="text" id="productSubcategory">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="productGender">الجنس</label>
                                <select id="productGender">
                                    <option value="unisex">للجميع</option>
                                    <option value="male">رجالي</option>
                                    <option value="female">نسائي</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="productStock">المخزون</label>
                                <input type="number" id="productStock" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="productDescription">الوصف</label>
                            <textarea id="productDescription"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="productImage">رابط الصورة</label>
                            <input type="url" id="productImage">
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="productFeatured">
                                منتج مميز
                            </label>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="submit-btn">إضافة المنتج</button>
                            <button type="button" class="cancel-btn" onclick="switchSection('products')">إلغاء</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Add Category Section -->
            <div id="add-category" class="content-section">
                <h2>إضافة قسم جديد</h2>
                <div class="form-container">
                    <form id="categoryForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="categoryId">معرف القسم *</label>
                                <input type="text" id="categoryId" required>
                            </div>
                            <div class="form-group">
                                <label for="categoryName">اسم القسم *</label>
                                <input type="text" id="categoryName" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="categoryIcon">الأيقونة</label>
                                <input type="text" id="categoryIcon" placeholder="مثال: fa-box">
                            </div>
                            <div class="form-group">
                                <label for="categoryOrder">ترتيب العرض</label>
                                <input type="number" id="categoryOrder" value="1">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="categorySubcategories">الفروع (مفصولة بفواصل)</label>
                            <textarea id="categorySubcategories" placeholder="مثال: فرع 1, فرع 2, فرع 3"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="submit-btn">إضافة القسم</button>
                            <button type="button" class="cancel-btn" onclick="switchSection('categories')">إلغاء</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
