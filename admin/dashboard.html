<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المسؤول - TiqtaQo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000;
            --secondary: #666;
            --bg: #f5f5f5;
            --white: #fff;
            --danger: #dc3545;
            --success: #28a745;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); direction: rtl; }

        .dashboard { min-height: 100vh; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-danger { background: var(--danger); color: var(--white); }
        
        .section { background: var(--white); padding: 30px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section-title { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group label { margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid #ddd; border-radius: 4px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: var(--white); }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-actions { display: flex; gap: 10px; margin-top: 10px; }

        .loading { text-align: center; padding: 40px; font-size: 18px; }
        .message { padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>لوحة تحكم TiqtaQo</h1>
            <div>
                <a href="../index.html" class="btn" style="background: #eee; color: #333; margin-left: 10px;">زيارة الموقع</a>
                <button onclick="handleLogout()" class="btn btn-danger">تسجيل الخروج</button>
            </div>
        </div>

        <div id="messageBox" class="message"></div>

        <!-- Add Product Form -->
        <div class="section">
            <h2 class="section-title">إضافة منتج جديد</h2>
            <form id="productForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>اسم المنتج</label>
                        <input type="text" id="pName" required>
                    </div>
                    <div class="form-group">
                        <label>السعر (DH)</label>
                        <input type="number" id="pPrice" required>
                    </div>
                    <div class="form-group">
                        <label>القسم</label>
                        <select id="pCategory" required>
                            <option value="packs">Packs</option>
                            <option value="homme">Homme</option>
                            <option value="femme">Femme</option>
                            <option value="accessoires">Accessoires</option>
                            <option value="wallets">Wallets</option>
                            <option value="belts">Belts</option>
                            <option value="glasses">Glasses</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة</label>
                        <input type="text" id="pImage" placeholder="https://..." required>
                    </div>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="pDesc" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">حفظ المنتج</button>
            </form>
        </div>

        <!-- Products List -->
        <div class="section">
            <h2 class="section-title">المنتجات الحالية</h2>
            <div id="productsList" class="products-grid">
                <div class="loading">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tiqtaqo-backend-hx6ych8ay-tiqtaqos-projects.vercel.app/api';
        
        // Check Auth
        if (!localStorage.getItem('auth_token')) {
            window.location.href = 'login.html';
        }

        function handleLogout() {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
        }

        function showMsg(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = `message ${type}`;
            setTimeout(() => box.style.display = 'none', 3000);
        }

        // Load Products
        async function loadProducts() {
            const list = document.getElementById('productsList');
            try {
                const res = await fetch(`${API_URL}/products`);
                const products = await res.json();
                
                if (products.length === 0) {
                    list.innerHTML = '<div class="loading">لا توجد منتجات حالياً</div>';
                    return;
                }

                list.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/300'">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.price} DH | ${p.category}</p>
                            <div class="product-actions">
                                <button onclick="deleteProduct('${p._id}')" class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;">حذف</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<div class="loading">خطأ في تحميل المنتجات</div>';
            }
        }

        // Add Product
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'جاري الحفظ...';

            const product = {
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value),
                category: document.getElementById('pCategory').value,
                image: document.getElementById('pImage').value,
                description: document.getElementById('pDesc').value,
                stock: 100
            };

            try {
                const res = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    },
                    body: JSON.stringify(product)
                });

                if (res.ok) {
                    showMsg('تم إضافة المنتج بنجاح!', 'success');
                    e.target.reset();
                    loadProducts();
                } else {
                    showMsg('فشل في إضافة المنتج', 'error');
                }
            } catch (err) {
                showMsg('خطأ في الاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'حفظ المنتج';
            }
        };

        // Delete Product
        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
            
            try {
                const res = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    }
                });

                if (res.ok) {
                    showMsg('تم حذف المنتج بنجاح', 'success');
                    loadProducts();
                }
            } catch (err) {
                showMsg('خطأ في الحذف', 'error');
            }
        }

        // Init
        loadProducts();
    </script>
</body>
</html>
