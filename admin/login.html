<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المسؤول - Tiqtaqo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #d4af37;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d4af37 0%, #c9a227 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #f44336;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background-color: #ffebee;
            border-radius: 5px;
            display: none;
            border-left: 4px solid #f44336;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        .success-message {
            color: #4caf50;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 5px;
            display: none;
            border-left: 4px solid #4caf50;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .login-btn.loading .loading-spinner {
            display: block;
        }

        .login-btn.loading span {
            opacity: 0.7;
        }

        .info-box {
            background-color: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        .info-box i {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-lock"></i> Tiqtaqo Admin</h1>
            <p>لوحة تحكم المسؤول</p>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            استخدم بيانات اعتماد المسؤول للدخول
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="أدخل بريدك الإلكتروني"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="أدخل كلمة المرور"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span>تسجيل الدخول</span>
                <div class="loading-spinner"></div>
            </button>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>
    </div>

    <script>
        // ============================================
        // تكوين التطبيق
        // ============================================
        const CONFIG = {
            ADMIN_EMAIL: 'tiqtaqo00@gmail.com',
            ADMIN_PASSWORD: 'Med123med lgtm',
            REDIRECT_DELAY: 1500,
            TOKEN_NAME: 'auth_token', // ✅ نفس اسم المتغير في dashboard.html
            EMAIL_NAME: 'admin_email'
        };

        // ============================================
        // دوال مساعدة
        // ============================================
        
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.add('show');
            console.error('❌ خطأ:', message);
        }

        function hideError() {
            const errorElement = document.getElementById('errorMessage');
            errorElement.classList.remove('show');
            errorElement.textContent = '';
        }

        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.classList.add('show');
            console.log('✅ نجاح:', message);
        }

        function hideSuccess() {
            const successElement = document.getElementById('successMessage');
            successElement.classList.remove('show');
            successElement.textContent = '';
        }

        function setLoadingState(isLoading) {
            const loginBtn = document.getElementById('loginBtn');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.classList.add('loading');
                emailInput.disabled = true;
                passwordInput.disabled = true;
            } else {
                loginBtn.disabled = false;
                loginBtn.classList.remove('loading');
                emailInput.disabled = false;
                passwordInput.disabled = false;
            }
        }

        function saveSession(email) {
            try {
                if (!window.localStorage) {
                    throw new Error('localStorage غير متاح في المتصفح');
                }

                // ✅ استخدام نفس أسماء المتغيرات في dashboard.html
                localStorage.setItem(CONFIG.TOKEN_NAME, 'authenticated');
                localStorage.setItem(CONFIG.EMAIL_NAME, email);
                localStorage.setItem('admin_login_time', new Date().toISOString());

                console.log('✅ تم حفظ بيانات الجلسة بنجاح');
                console.log('Token name:', CONFIG.TOKEN_NAME);
                console.log('Token value:', localStorage.getItem(CONFIG.TOKEN_NAME));
                return true;
            } catch (error) {
                console.error('❌ خطأ في حفظ البيانات:', error);
                showError('خطأ في حفظ بيانات الجلسة. يرجى التحقق من إعدادات المتصفح.');
                return false;
            }
        }

        function validateCredentials(email, password) {
            if (!email || !password) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('صيغة البريد الإلكتروني غير صحيحة');
                return false;
            }

            if (email !== CONFIG.ADMIN_EMAIL || password !== CONFIG.ADMIN_PASSWORD) {
                showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
                return false;
            }

            return true;
        }

        function redirectToDashboard() {
            console.log('🔄 جاري إعادة التوجيه إلى لوحة التحكم...');
            
            setTimeout(() => {
                try {
                    window.location.href = 'dashboard.html';
                    console.log('✅ تم إعادة التوجيه بنجاح');
                } catch (error) {
                    console.error('❌ خطأ في إعادة التوجيه:', error);
                    showError('خطأ في إعادة التوجيه. يرجى المحاولة مرة أخرى.');
                    setLoadingState(false);
                }
            }, CONFIG.REDIRECT_DELAY);
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            hideError();
            hideSuccess();

            if (!validateCredentials(email, password)) {
                setLoadingState(false);
                return;
            }

            setLoadingState(true);

            try {
                console.log('🔐 جاري التحقق من بيانات المستخدم...');

                await new Promise(resolve => setTimeout(resolve, 500));

                if (!saveSession(email)) {
                    throw new Error('فشل حفظ بيانات الجلسة');
                }

                showSuccess('✅ تم التحقق بنجاح! جاري إعادة التوجيه...');

                redirectToDashboard();

            } catch (error) {
                console.error('❌ خطأ في تسجيل الدخول:', error);
                showError(error.message || 'حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى.');
                setLoadingState(false);
            }
        }

        function checkAuthStatus() {
            try {
                // ✅ البحث عن نفس اسم المتغير
                const token = localStorage.getItem(CONFIG.TOKEN_NAME);
                const email = localStorage.getItem(CONFIG.EMAIL_NAME);

                if (token && email) {
                    console.log('✅ المستخدم مسجل دخول بالفعل. جاري إعادة التوجيه...');
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error('❌ خطأ في التحقق من حالة تسجيل الدخول:', error);
            }
        }

        function initializeApp() {
            console.log('🚀 جاري تهيئة تطبيق تسجيل الدخول...');
            console.log('Token name:', CONFIG.TOKEN_NAME);

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLogin);
                console.log('✅ تم تسجيل مستمع حدث النموذج');
            } else {
                console.error('❌ لم يتم العثور على نموذج تسجيل الدخول');
            }

            checkAuthStatus();

            console.log('✅ تم تهيئة التطبيق بنجاح');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
